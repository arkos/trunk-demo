name: CI workflow

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python Dependencies
        run: |
          pip -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff build

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Run Tests
        run: pytest

      - name: Build Package
        run: python -m build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: python-dist-${{ github.sha }}
          path: dist/
