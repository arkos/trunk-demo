name: CI workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Run Tests
        run: pytest

      - name: Simulate Deploy
        run: echo "Deploying app from main..."
